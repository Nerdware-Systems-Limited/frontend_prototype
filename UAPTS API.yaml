openapi: 3.0.3
info:
  title: UAPTS API
  version: 1.0.0
  description: |-
    ## Unified Analytics and Predictive Transport System

    Government-grade REST API for Kenya's **State Department for Transport**. Consolidates operational data from 11 transport-sector agencies (NTSA, KeNHA, KURA, KeRRA, KRC, KPA, KAA, KMA, NCTTCA, NaMATA, LAPSSET) into a single, auditable analytics plane.

    **Base URL:** `https://api.uapts.go.ke/`

    ### Quick start

    1. **Authenticate** - `POST /api/v1/auth/login/` with email + password. Receive a short-lived JWT `access` token and a long-lived `refresh` token.
    2. **Call a protected endpoint** - pass the access token in the `Authorization: Bearer <access>` header.
    3. **Refresh before expiry** - `POST /api/v1/auth/token/refresh/` with the refresh token to obtain a new pair (refresh tokens are rotated).

    ### Stability tiers

    | Tier | Promise |
    | --- | --- |
    | **Stable** | No breaking change without a 6-month deprecation window. |
    | **Beta** | May change within the current major version. |
    | **Internal** | Not for partner consumption. |

    All endpoints documented here are **Stable** unless explicitly tagged.

    ### Errors

    All error responses share the same envelope:

    ```json
    {
      "detail":     "Human-readable summary.",
      "code":       "machine_readable_code",
      "errors":     [ { "field": "email", "message": "...", "code": "invalid" } ],
      "request_id": "9f0c-44b1-aa72-2026-06-17T19:42:11Z"
    }
    ```

    See the [human-authored reference](https://github.com/uapts/uapts-backend/tree/main/docs) (`docs/`) for full policy documentation including rate limiting, security, audit, and the deprecation procedure.

    ### Support

    - **Internal:** `#uapts-api` Slack channel.
    - **Partner agencies:** `api-support@uapts.go.ke` (include the `X-Request-ID`).
    - **Security disclosures:** `security@uapts.go.ke`.
paths:
  /api/:
    get:
      operationId: root_retrieve
      description: Public service banner - returns the running version, environment,
        description, and an inventory of stable endpoint surfaces. Use this as a liveness
        probe and to discover documentation links.
      summary: Service banner
      tags:
      - meta
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Root'
              examples:
                Root:
                  value:
                    name: UAPTS API
                    version: 1.0.0
                    environment: production
                    description: Unified Analytics and Predictive Transport System
                    documentation_url: https://api.uapts.go.ke/api/docs/
                    timestamp: '2026-06-17T19:42:11+00:00'
                    endpoints:
                      auth: https://api.uapts.go.ke/api/v1/auth/
                      accounts: https://api.uapts.go.ke/api/v1/accounts/
                      docs_swagger: https://api.uapts.go.ke/api/docs/
                      docs_redoc: https://api.uapts.go.ke/api/redoc/
                      schema: https://api.uapts.go.ke/api/schema/
                      health: https://api.uapts.go.ke/api/v1/health/
                  summary: root
          description: Service banner.
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: 'Authenticates the user with email + password and returns a short-lived
        access token (15 min) and a refresh token (30 d). Use the access token in
        the `Authorization: Bearer *** header on every protected request. The response
        also includes the user''s profile so a single call is enough to bootstrap
        a session.'
      summary: Obtain a JWT token pair
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: operator@ntsa.go.ke
                password:
                  type: string
                  format: password
                  example: <redacted>
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    example: eyJhbG...VCJ9...
                  refresh:
                    type: string
                    example: eyJhbG...VCJ9...
                  user:
                    type: object
                    example:
                      id: 8fa074f5-6ea0-4430-a7b3-92a3bf3fcea7
                      email: operator@ntsa.go.ke
                      role_type: operator
                      role: f0e0d2a1-9c8b-4a4f-8b62-1c7e5d0b3a4f
                      role_name: operator
                      agency: 0a91b3c5-7c8d-4a4f-8b62-1c7e5d0b3a4f
                      agency_code: NTSA
                      department: 47b3a1d0-2e1a-4d9a-9c8b-1f3e2d6c7b8a
                      mfa_active: true
                      is_active: true
                      is_staff: false
                      created_at: '2026-06-17T19:42:11+00:00'
          description: Authenticated. `access` and `refresh` are JWTs; `user` is the
            profile.
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: object
                  required:
                  - detail
                  properties:
                    detail:
                      example: Invalid input.
                    code:
                      example: validation_error
                    errors:
                      type: array
                      description: Per-field validation errors. Present on 400 responses.
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            example: email
                          message:
                            type: string
                            example: Enter a valid email address.
                          code:
                            type: string
                            example: invalid
                      example:
                      - field: email
                        message: Enter a valid email address.
                        code: invalid
                      - field: password
                        message: Password too short.
                        code: min_length
                    request_id:
                      type: string
                      format: uuid
                      description: Echoes the X-Request-ID header, server-generated
                        if absent.
                      example: 9f0c-44b1-aa72-2026-06-17T19:42:11Z
              examples:
                400ValidationError:
                  value:
                    detail: Invalid input.
                    code: validation_error
                    request_id: 9f0c-44b1-aa72-2026-06-17T19:42:11Z
                  summary: 400 validation_error
          description: One or more fields failed validation.
        '401':
          description: Invalid credentials.
        '403':
          description: MFA challenge required. Body contains `mfa_token`.
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: object
                  required:
                  - detail
                  properties:
                    detail:
                      example: Request was throttled. Expected available in 47 seconds.
                    code:
                      example: throttled
                    errors:
                      type: array
                      description: Per-field validation errors. Present on 400 responses.
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            example: email
                          message:
                            type: string
                            example: Enter a valid email address.
                          code:
                            type: string
                            example: invalid
                      example:
                      - field: email
                        message: Enter a valid email address.
                        code: invalid
                      - field: password
                        message: Password too short.
                        code: min_length
                    request_id:
                      type: string
                      format: uuid
                      description: Echoes the X-Request-ID header, server-generated
                        if absent.
                      example: 9f0c-44b1-aa72-2026-06-17T19:42:11Z
              examples:
                429Throttled:
                  value:
                    detail: Request was throttled. Expected available in 47 seconds.
                    code: throttled
                    request_id: 9f0c-44b1-aa72-2026-06-17T19:42:11Z
                  summary: 429 throttled
          description: Per-scope rate limit exceeded. See Rate Limiting in /api/docs/.
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: object
                  required:
                  - detail
                  properties:
                    detail:
                      example: Internal server error.
                    code:
                      example: internal_error
                    errors:
                      type: array
                      description: Per-field validation errors. Present on 400 responses.
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            example: email
                          message:
                            type: string
                            example: Enter a valid email address.
                          code:
                            type: string
                            example: invalid
                      example:
                      - field: email
                        message: Enter a valid email address.
                        code: invalid
                      - field: password
                        message: Password too short.
                        code: min_length
                    request_id:
                      type: string
                      format: uuid
                      description: Echoes the X-Request-ID header, server-generated
                        if absent.
                      example: 9f0c-44b1-aa72-2026-06-17T19:42:11Z
              examples:
                500InternalError:
                  value:
                    detail: Internal server error.
                    code: internal_error
                    request_id: 9f0c-44b1-aa72-2026-06-17T19:42:11Z
                  summary: 500 internal_error
          description: Unhandled exception. Always a bug - please report with X-Request-ID.
