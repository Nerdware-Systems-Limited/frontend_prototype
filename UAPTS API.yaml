    PatchedAccidentRequest:
      type: object
      description: Fatality-bearing accident record (FR-M05-002).
      properties:
        segment:
          type: string
          format: uuid
        black_spot:
          type: string
          format: uuid
          nullable: true
        incident:
          type: string
          format: uuid
          nullable: true
          description: Optional link to the originating Incident row.
        fatality_category:
          $ref: '#/components/schemas/FatalityCategoryEnum'
        fatalities:
          type: integer
          maximum: 32767
          minimum: 0
        serious_injuries:
          type: integer
          maximum: 32767
          minimum: 0
        minor_injuries:
          type: integer
          maximum: 32767
          minimum: 0
        cause_of_accident:
          type: string
          minLength: 1
          maxLength: 255
        weather_condition:
          type: string
          maxLength: 50
        road_condition:
          type: string
          maxLength: 50
        severity_classification:
          $ref: '#/components/schemas/SeverityClassificationEnum'
        occurred_at:
          type: string
          format: date-time
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
    PatchedAgencyRequest:
      type: object
      description: A registered government transport agency (NTSA, KPA, KAA, ...).
      properties:
        agency_name:
          type: string
          minLength: 1
          description: Long-form name of the agency (e.g. 'Kenya National Highways
            Authority').
          maxLength: 255
        agency_code:
          type: string
          minLength: 1
          description: Stable short code (e.g. 'NTSA', 'KeNHA'). Used as the canonical
            foreign-key reference throughout the platform.
          maxLength: 20
        contact_email:
          type: string
          format: email
          description: Public-facing contact email. Optional.
    PatchedAlertRuleRequest:
      type: object
      description: Read + write serializer for an alert rule document.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        event_type:
          type: string
          minLength: 1
          maxLength: 200
        condition:
          type: object
          additionalProperties: {}
          nullable: true
        severity:
          allOf:
          - $ref: '#/components/schemas/Severity0c8Enum'
          default: warning
        channels:
          type: array
          items:
            type: string
            minLength: 1
        target_roles:
          type: array
          items:
            type: string
            minLength: 1
          description: Match active users with any of these role codes.
        target_user_ids:
          type: array
          items:
            type: string
            minLength: 1
          description: Override target_roles and send to these user_ids only.
        message_template:
          type: string
          default: ''
          description: 'Template with {field} placeholders, e.g. ''{agency} overload
            at {station}: {weight_kg}kg'''
        cooldown_seconds:
          type: integer
          maximum: 604800
          minimum: 0
          default: 0
        active:
          type: boolean
          default: true
    PatchedBlackSpotRequest:
      type: object
      description: KDE-derived accident cluster (FR-M05-004).
      properties:
        segment:
          type: string
          format: uuid
        accident_count_rolling:
          type: integer
          maximum: 2147483647
          minimum: 0
        fatality_count_rolling:
          type: integer
          maximum: 2147483647
          minimum: 0
        ranking_tier:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/RankingTierEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        kde_intensity:
          type: number
          format: double
          description: Kernel density estimation value (FR-M05-004).
        radius_m:
          type: number
          format: double
          description: Cluster radius in metres used for KDE.
        window_days:
          type: integer
          maximum: 32767
          minimum: 0
          description: Lookback window over which the count was computed.
        centroid_latitude:
          type: number
          format: double
