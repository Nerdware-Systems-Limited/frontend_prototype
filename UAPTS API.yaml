    get:
      operationId: v1_traffic_summary_retrieve
      description: |-
        Single-shot payload powering the M02 traffic dashboard. Returns:
        * `kpis` - system-wide counters and averages
        * `volume_24h` - hourly volume time series for the last 24h
        * `class_breakdown` - vehicle-class shares for the last 7d
        * `congestion_distribution` - share of observations in each level
        * `speed_compliance` - fleet-wide compliance percentage
        * `forecast_next_hour` - aggregated forecast for the next 60 min
      summary: M02 dashboard summary
