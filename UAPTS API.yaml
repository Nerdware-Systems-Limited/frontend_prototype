  /api/v1/health/:
    get:
      operationId: v1_health_retrieve
      description: Public, unauthenticated. Reports the status of every backing service
        (database, GIS engine, Redis cache, Redis channel layer, Celery workers, WebSocket
        reachability). HTTP `200` indicates the service is healthy or merely degraded
        (still serving traffic). HTTP `503` indicates an unhealthy state - the load
        balancer removes the pod from rotation.
      summary: Liveness / readiness probe
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                Healthy:
                  value:
                    name: uapts
                    version: 1.0.0
                    status: healthy
                    environment: production
                    uptime_seconds: 86420
                    timestamp: '2026-06-17T19:42:11+00:00'
                    components:
                      database:
                        status: ok
                        response_ms: 1.4
                      gis_engine:
                        status: ok
                        response_ms: 0.1
                      redis_cache:
                        status: ok
                        response_ms: 2.0
                      redis_channels:
                        status: ok
                        response_ms: 1.7
                      celery_workers:
                        status: ok
                        active_workers: 4
                      websocket:
                        status: ok
                    system:
                      disk_used_pct: 42.1
                      memory_used_pct: 61.3
                      cpu_used_pct: 18.5
                  summary: healthy
          description: Service is healthy or degraded.
        '503':
          description: Service is unhealthy - at least one critical component is in
            error.
components:
  schemas:
    Accident:
      type: object
      description: Fatality-bearing accident record (FR-M05-002).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        segment:
          type: string
          format: uuid
        segment_code:
          type: string
          readOnly: true
        black_spot:
          type: string
          format: uuid
          nullable: true
        incident:
          type: string
          format: uuid
          nullable: true
          description: Optional link to the originating Incident row.
        incident_ref:
          type: string
          readOnly: true
        fatality_category:
          $ref: '#/components/schemas/FatalityCategoryEnum'
        fatalities:
          type: integer
          maximum: 32767
          minimum: 0
        serious_injuries:
          type: integer
          maximum: 32767
          minimum: 0
        minor_injuries:
          type: integer
          maximum: 32767
          minimum: 0
        cause_of_accident:
          type: string
          maxLength: 255
        weather_condition:
          type: string
          maxLength: 50
        road_condition:
          type: string
          maxLength: 50
        severity_classification:
          $ref: '#/components/schemas/SeverityClassificationEnum'
        occurred_at:
          type: string
          format: date-time
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cause_of_accident
      - created_at
      - fatality_category
      - id
      - incident_ref
      - occurred_at
      - segment
      - segment_code
      - severity_classification
      - updated_at
    AccidentRequest:
      type: object
      description: Fatality-bearing accident record (FR-M05-002).
      properties:
        segment:
          type: string
          format: uuid
        black_spot:
          type: string
          format: uuid
          nullable: true
        incident:
          type: string
          format: uuid
          nullable: true
          description: Optional link to the originating Incident row.
        fatality_category:
          $ref: '#/components/schemas/FatalityCategoryEnum'
        fatalities:
          type: integer
          maximum: 32767
          minimum: 0
        serious_injuries:
          type: integer
          maximum: 32767
          minimum: 0
        minor_injuries:
          type: integer
          maximum: 32767
          minimum: 0
        cause_of_accident:
          type: string
          minLength: 1
          maxLength: 255
        weather_condition:
          type: string
          maxLength: 50
        road_condition:
          type: string
          maxLength: 50
        severity_classification:
          $ref: '#/components/schemas/SeverityClassificationEnum'
        occurred_at:
          type: string
          format: date-time
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
      required:
      - cause_of_accident
      - fatality_category
      - occurred_at
      - segment
      - severity_classification
    Agency:
      type: object
      description: A registered government transport agency (NTSA, KPA, KAA, ...).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated UUIDv4 identifier.
        agency_name:
          type: string
          description: Long-form name of the agency (e.g. 'Kenya National Highways
            Authority').
          maxLength: 255
        agency_code:
          type: string
          description: Stable short code (e.g. 'NTSA', 'KeNHA'). Used as the canonical
            foreign-key reference throughout the platform.
          maxLength: 20
        contact_email:
          type: string
          format: email
          description: Public-facing contact email. Optional.
      required:
      - agency_code
      - agency_name
      - id
    AgencyRequest:
      type: object
      description: A registered government transport agency (NTSA, KPA, KAA, ...).
      properties:
        agency_name:
          type: string
          minLength: 1
          description: Long-form name of the agency (e.g. 'Kenya National Highways
            Authority').
          maxLength: 255
        agency_code:
          type: string
          minLength: 1
          description: Stable short code (e.g. 'NTSA', 'KeNHA'). Used as the canonical
            foreign-key reference throughout the platform.
          maxLength: 20
        contact_email:
          type: string
          format: email
          description: Public-facing contact email. Optional.
      required:
      - agency_code
      - agency_name
    Aircraft:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        registration:
          type: string
          description: e.g. 5Y-KQZ
          maxLength: 20
        aircraft_type:
          $ref: '#/components/schemas/AircraftTypeEnum'
        manufacturer:
          type: string
          maxLength: 80
        model:
          type: string
          maxLength: 80
        mtow_kg:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Max Take-Off Weight (kg)
        seats_capacity:
          type: integer
          maximum: 32767
          minimum: 0
        year_built:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
        airline:
          type: string
          format: uuid
          nullable: true
        airline_iata:
          type: string
          readOnly: true
        in_service:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - aircraft_type
      - airline_iata
      - created_at
      - id
      - registration
      - updated_at
    AircraftTypeEnum:
      enum:
      - narrow_body
      - wide_body
      - regional
      - cargo
      - business
      type: string
      description: |-
        * `narrow_body` - Narrow-body jet
        * `wide_body` - Wide-body jet
        * `regional` - Regional turboprop
        * `cargo` - Dedicated freighter
        * `business` - Business jet
    Airline:
      type: object
      description: An airline operator (KQ, KLM, …).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        iata_code:
          type: string
          maxLength: 3
        icao_code:
          type: string
          maxLength: 4
        name:
          type: string
          maxLength: 200
        country:
          type: string
          maxLength: 80
        is_cargo_only:
          type: boolean
        aoc_status:
          allOf:
          - $ref: '#/components/schemas/AocStatusEnum'
          description: |-
            Air Operator Certificate status (KCAA)

            * `valid` - Valid
            * `suspended` - Suspended
            * `pending` - Pending
            * `revoked` - Revoked
        fleet_size:
          type: integer
          maximum: 32767
          minimum: 0
        agency:
          type: string
          format: uuid
          nullable: true
        agency_code:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - agency_code
      - created_at
      - iata_code
      - icao_code
      - id
      - name
      - updated_at
    Airport:
      type: object
      description: A national airport (FR-M07-001 dashboard anchor).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        iata_code:
          type: string
          maxLength: 4
        icao_code:
          type: string
          maxLength: 5
        name:
          type: string
          maxLength: 200
        city:
          type: string
          maxLength: 120
        country:
          type: string
          maxLength: 80
        airport_type:
          $ref: '#/components/schemas/AirportTypeEnum'
        runway_count:
          type: integer
          maximum: 32767
          minimum: 0
        has_international:
          type: boolean
        design_capacity_passengers:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Design capacity, passengers per year
        elevation_ft:
          type: integer
          maximum: 2147483647
          minimum: 0
        operator:
          type: string
          description: Usually Kenya Airports Authority
          maxLength: 120
        active:
          type: boolean
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        location_id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - city
      - created_at
      - iata_code
      - icao_code
      - id
      - location_id
      - name
      - updated_at
    AirportTypeEnum:
      enum:
      - international
      - regional
      - domestic
      - military
      - private
      type: string
      description: |-
        * `international` - International
        * `regional` - Regional
        * `domestic` - Domestic
        * `military` - Military / joint-use
        * `private` - Private / charter
    AlertRule:
      type: object
      description: Read + write serializer for an alert rule document.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 200
        event_type:
          type: string
          maxLength: 200
        condition:
          type: object
          additionalProperties: {}
          nullable: true
        severity:
          allOf:
          - $ref: '#/components/schemas/Severity0c8Enum'
          default: warning
        channels:
          type: array
          items:
            type: string
        target_roles:
          type: array
          items:
            type: string
          description: Match active users with any of these role codes.
        target_user_ids:
          type: array
          items:
            type: string
          description: Override target_roles and send to these user_ids only.
        message_template:
          type: string
          default: ''
          description: 'Template with {field} placeholders, e.g. ''{agency} overload
            at {station}: {weight_kg}kg'''
        cooldown_seconds:
          type: integer
          maximum: 604800
          minimum: 0
          default: 0
        active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_fired_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - event_type
      - id
      - last_fired_at
      - name
      - updated_at
    AlertRuleRequest:
      type: object
      description: Read + write serializer for an alert rule document.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        event_type:
          type: string
          minLength: 1
          maxLength: 200
        condition:
          type: object
          additionalProperties: {}
          nullable: true
        severity:
          allOf:
          - $ref: '#/components/schemas/Severity0c8Enum'
